<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .pill{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:999px;border:1.5px solid var(--ink-1000);}
  .tag{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 8px;border:1.5px solid var(--ink-1000);}
  .status-dot{display:inline-block;width:6px;height:6px;border-radius:999px;margin-right:6px;vertical-align:middle;}
</style></head>
<body>
<div class="card">
  <div class="label">Tags & status pills</div>
  <div class="row" style="margin-bottom:12px;">
    <span class="tag" style="background:var(--ink-1000);color:var(--cream-50);">SHIP-READY</span>
    <span class="tag" style="background:var(--orange-500);color:var(--ink-1000);">NEW</span>
    <span class="tag" style="background:var(--cream-50);">v0.4.1</span>
    <span class="tag" style="background:var(--teal-100);border-color:var(--teal-600);color:var(--teal-600);">RARE</span>
  </div>
  <div class="row">
    <span class="pill" style="background:var(--cream-50);"><span class="status-dot" style="background:var(--green-500);"></span>Live</span>
    <span class="pill" style="background:var(--cream-50);"><span class="status-dot" style="background:var(--orange-500);"></span>Building</span>
    <span class="pill" style="background:var(--cream-50);"><span class="status-dot" style="background:var(--ink-300);"></span>Idle</span>
    <span class="pill" style="background:var(--cream-50);"><span class="status-dot" style="background:var(--red-500);"></span>Down</span>
  </div>
</div>
</body></html>
