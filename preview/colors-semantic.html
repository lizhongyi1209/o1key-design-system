<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;border:var(--border-default) solid var(--line-strong);}
  td{padding:10px 12px;border-bottom:1px solid var(--line-1);font-family:var(--font-mono);font-size:11px;}
  td:first-child{font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}
  td:last-child{text-align:right;color:var(--fg-2);}
  tr:last-child td{border-bottom:0;}
  .chip{display:inline-block;width:22px;height:22px;vertical-align:middle;margin-right:8px;border:1px solid var(--ink-1000);}
</style></head>
<body>
<div class="card">
  <div class="label">Semantic tokens — foreground & background</div>
  <table>
    <tr><td><span class="chip" style="background:#0A0908"></span>--fg-1</td><td>primary text</td><td>ink-1000</td></tr>
    <tr><td><span class="chip" style="background:#6B6259"></span>--fg-2</td><td>secondary text</td><td>ink-500</td></tr>
    <tr><td><span class="chip" style="background:#B8AFA3"></span>--fg-3</td><td>tertiary / placeholder</td><td>ink-300</td></tr>
    <tr><td><span class="chip" style="background:#FAF6EE"></span>--bg-page</td><td>page background</td><td>cream-50</td></tr>
    <tr><td><span class="chip" style="background:#F2EBDD"></span>--bg-surface</td><td>card / surface</td><td>cream-100</td></tr>
    <tr><td><span class="chip" style="background:#FF5A1F"></span>--accent</td><td>hero accent</td><td>orange-500</td></tr>
    <tr><td><span class="chip" style="background:#1FBFA8"></span>--gem</td><td>rare highlight</td><td>teal-500</td></tr>
  </table>
</div>
</body></html>
