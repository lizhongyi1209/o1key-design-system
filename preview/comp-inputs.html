<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:24px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .lab{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);}
  .input{font-family:var(--font-body);font-size:14px;padding:10px 12px;border:1.5px solid var(--ink-1000);background:var(--cream-50);outline:none;}
  .input:focus{box-shadow:3px 3px 0 0 var(--orange-500);}
  .row{display:flex;gap:14px;}
  .row .field{flex:1;}
</style></head>
<body>
<div class="card">
  <div class="label">Form inputs</div>
  <div class="field">
    <div class="lab">// Email</div>
    <input class="input" placeholder="you@o1key.dev" />
  </div>
  <div class="row">
    <div class="field">
      <div class="lab">// Key</div>
      <input class="input" value="0xD3-1F-5A-2026" />
    </div>
    <div class="field">
      <div class="lab">// Region</div>
      <input class="input" value="JP-EAST" />
    </div>
  </div>
</div>
</body></html>
