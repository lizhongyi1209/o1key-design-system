<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);}
  .card{padding:28px;display:flex;align-items:center;gap:24px;}
  .lockup{display:flex;align-items:center;gap:12px;}
  .glyph{width:56px;height:56px;background:var(--ink-1000);color:var(--orange-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-0.04em;border:2px solid var(--ink-1000);}
  .word{font-family:var(--font-display);font-weight:700;font-size:42px;letter-spacing:-0.04em;color:var(--ink-1000);line-height:1;}
  .word .o{color:var(--ink-1000);}
  .word .one{color:var(--orange-500);}
  .word .dot{display:inline-block;width:8px;height:8px;background:var(--orange-500);margin-left:2px;vertical-align:baseline;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);}
  .vline{width:1.5px;height:64px;background:var(--ink-1000);}
</style></head>
<body>
<div class="card">
  <div class="lockup">
    <div class="glyph">o<span style="color:#FF5A1F">1</span></div>
    <div class="word"><span class="o">o</span><span class="one">1</span><span class="o">key</span><span class="dot"></span></div>
  </div>
  <div class="vline"></div>
  <div>
    <div class="meta">// Wordmark · Glyph</div>
    <div style="font-family:var(--font-body);font-size:13px;color:var(--fg-2);margin-top:6px;line-height:1.4;">Hero "1" carries the orange.<br/>Square glyph for tight spaces.</div>
  </div>
</div>
</body></html>
