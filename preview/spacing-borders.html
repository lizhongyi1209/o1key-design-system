<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .seg{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .b{height:32px;background:var(--cream-100);}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg-2);}
</style></head>
<body>
<div class="card">
  <div class="label">Border weights — heavy & present</div>
  <div class="row">
    <div class="seg"><div class="b" style="width:140px;border:1px solid #0A0908"></div><div class="name">hairline · 1px</div></div>
    <div class="seg"><div class="b" style="width:140px;border:1.5px solid #0A0908"></div><div class="name">default · 1.5px</div></div>
    <div class="seg"><div class="b" style="width:140px;border:2px solid #0A0908"></div><div class="name">bold · 2px</div></div>
    <div class="seg"><div class="b" style="width:140px;border:3px solid #0A0908"></div><div class="name">heavy · 3px</div></div>
  </div>
</div>
</body></html>
