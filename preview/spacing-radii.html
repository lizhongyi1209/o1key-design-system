<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:var(--ink-1000);border:2px solid var(--ink-1000);}
  .px{font-family:var(--font-mono);font-size:11px;font-weight:600;}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg-2);}
  .note{font-family:var(--font-body);font-size:12px;color:var(--fg-2);margin-top:14px;}
</style></head>
<body>
<div class="card">
  <div class="label">Corner radii — sharp by default</div>
  <div class="row">
    <div class="step"><div class="box" style="border-radius:0"></div><div class="px">0</div><div class="name">radius-0</div></div>
    <div class="step"><div class="box" style="border-radius:2px"></div><div class="px">2</div><div class="name">radius-1</div></div>
    <div class="step"><div class="box" style="border-radius:4px"></div><div class="px">4</div><div class="name">radius-2</div></div>
    <div class="step"><div class="box" style="border-radius:8px"></div><div class="px">8</div><div class="name">radius-3</div></div>
    <div class="step"><div class="box" style="border-radius:999px;background:var(--orange-500);border-color:var(--orange-500)"></div><div class="px">pill</div><div class="name">tags only</div></div>
  </div>
  <div class="note">Techwear doesn't pillow. Default is sharp. Round only when softening on purpose.</div>
</div>
</body></html>
