<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);}
  .card{padding:24px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .specimen{font-family:var(--font-display);font-weight:700;font-size:96px;line-height:.95;letter-spacing:-0.04em;color:var(--fg-1);}
  .meta{display:flex;gap:24px;margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);letter-spacing:0.04em;text-transform:uppercase;}
  .meta b{color:var(--fg-1);font-weight:600;}
</style></head>
<body>
<div class="card">
  <div class="label">Display — Space Grotesk 700 / -4% tracking</div>
  <div class="specimen">o1key.</div>
  <div class="meta"><span><b>96/91</b> tight</span><span><b>-0.04em</b> tracking</span><span><b>Space Grotesk</b></span></div>
</div>
</body></html>
