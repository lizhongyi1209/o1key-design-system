<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:var(--border-default) solid var(--line-strong);}
  .block{padding:14px;border-right:var(--border-default) solid var(--line-strong);height:108px;display:flex;flex-direction:column;justify-content:space-between;}
  .block:nth-child(2n){border-right:0;}
  .swatches{display:flex;gap:0;border:var(--border-default) solid var(--line-strong);}
  .sw{flex:1;height:48px;}
  .name{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;}
  .desc{font-family:var(--font-body);font-size:11px;color:var(--fg-2);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);}
</style></head>
<body>
<div class="card">
  <div class="label">Accent colors — orange (hero) & teal (rare gem)</div>
  <div class="grid">
    <div class="block">
      <div>
        <div class="name" style="color:#FF5A1F">Orange — hero accent</div>
        <div class="desc">Used sparingly. Never &gt; 10% of a frame.</div>
      </div>
      <div class="swatches">
        <div class="sw" style="background:#FFE2D3"></div>
        <div class="sw" style="background:#FF8A5F"></div>
        <div class="sw" style="background:#FF5A1F"></div>
        <div class="sw" style="background:#E64A12"></div>
      </div>
      <div class="hex">100 · 300 · 500 · 600</div>
    </div>
    <div class="block">
      <div>
        <div class="name" style="color:#0E9F8B">Teal — rare gem</div>
        <div class="desc">1–2 spots per page. Like the earring.</div>
      </div>
      <div class="swatches">
        <div class="sw" style="background:#C7EDE6"></div>
        <div class="sw" style="background:#1FBFA8"></div>
        <div class="sw" style="background:#0E9F8B"></div>
      </div>
      <div class="hex">100 · 500 · 600</div>
    </div>
  </div>
</div>
</body></html>
