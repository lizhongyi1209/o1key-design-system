<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .wrap{padding:24px;display:flex;gap:18px;}
  .card{flex:1;background:var(--cream-50);border:2px solid var(--ink-1000);padding:18px;box-shadow:3px 3px 0 0 var(--ink-1000);}
  .card.accent{box-shadow:3px 3px 0 0 var(--orange-500);}
  .ey{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);}
  .ttl{font-family:var(--font-display);font-weight:600;font-size:20px;margin:8px 0 4px;letter-spacing:-0.01em;}
  .desc{font-family:var(--font-body);font-size:13px;color:var(--fg-2);line-height:1.45;}
  .meta{margin-top:12px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-2);}
  .x{color:var(--orange-500);font-weight:700;}
</style></head>
<body>
<div class="wrap">
  <div class="card">
    <div class="ey">// 01 — Drop-in</div>
    <div class="ttl">Edge keys, anywhere</div>
    <div class="desc">Paste one line. The runtime handles the rest.</div>
    <div class="meta"><span>SN-04A</span><span class="x">↗</span></div>
  </div>
  <div class="card accent">
    <div class="ey">// 02 — Hot path</div>
    <div class="ttl">P95 under 12ms</div>
    <div class="desc">Geo-routed, zero cold start. Built for fast.</div>
    <div class="meta"><span>SN-04B</span><span class="x">↗</span></div>
  </div>
</div>
</body></html>
