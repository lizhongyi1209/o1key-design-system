<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .row{display:flex;gap:12px;align-items:center;}
  .icn{width:44px;height:44px;border:1.5px solid var(--ink-1000);background:var(--cream-50);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:18px;}
  .x{color:var(--orange-500);font-weight:700;font-size:22px;}
  .arrow{font-weight:700;font-size:20px;}
  .note{font-family:var(--font-body);font-size:12px;color:var(--fg-2);margin-top:14px;line-height:1.5;}
</style></head>
<body>
<div class="card">
  <div class="label">Iconography — outline, 1.5–2px stroke, no fill</div>
  <div class="row">
    <div class="icn"><span class="arrow">→</span></div>
    <div class="icn"><span class="arrow">↗</span></div>
    <div class="icn"><span class="x">×</span></div>
    <div class="icn"><span style="font-weight:700">+</span></div>
    <div class="icn"><span style="font-family:var(--font-mono);font-weight:700">[ ]</span></div>
    <div class="icn"><span style="font-family:var(--font-mono);font-weight:700">//</span></div>
    <div class="icn"><span style="font-family:var(--font-mono);font-weight:700">⟶</span></div>
  </div>
  <div class="note">Lucide (CDN) is the primary icon set. Mono glyphs (// → ↗ × +) appear as inline marks. No emoji.</div>
</div>
</body></html>
