<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);}
  .card{padding:20px;display:flex;flex-direction:column;gap:14px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);}
  .eyebrow{font-family:var(--font-mono);font-weight:500;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-1);}
  .serial{font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg-2);}
  .codeline{font-family:var(--font-mono);font-size:14px;background:var(--cream-100);border:1px solid var(--line-1);padding:8px 12px;display:inline-block;}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .badge{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;background:var(--ink-1000);color:var(--cream-50);padding:4px 8px;}
</style></head>
<body>
<div class="card">
  <div class="label">Mono — JetBrains Mono</div>
  <div class="eyebrow">// EYEBROW — UPPERCASE — 0.16em</div>
  <div class="row">
    <span class="serial">SN · 0X1KEY-04A · 2026</span>
    <span class="badge">SHIP-READY</span>
  </div>
  <div class="codeline">o1key.connect({ key: "0xD3-1F-5A" })</div>
</div>
</body></html>
