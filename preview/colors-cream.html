<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .row{display:flex;gap:0;align-items:stretch;border:var(--border-default) solid var(--line-strong);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border-right:var(--border-default) solid var(--line-strong);}
  .sw:last-child{border-right:0;}
  .sw .name{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;}
  .sw .hex{font-family:var(--font-mono);font-size:11px;opacity:.7;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:10px;}
</style></head>
<body>
<div class="card">
  <div class="label">Cream — page surfaces (warm white, never pure)</div>
  <div class="row">
    <div class="sw" style="background:#FAF6EE;color:#0A0908"><div class="name">cream-50</div><div class="hex">#FAF6EE</div></div>
    <div class="sw" style="background:#F2EBDD;color:#0A0908"><div class="name">cream-100</div><div class="hex">#F2EBDD</div></div>
    <div class="sw" style="background:#E6DCC7;color:#0A0908"><div class="name">cream-200</div><div class="hex">#E6DCC7</div></div>
    <div class="sw" style="background:#D4C7AB;color:#0A0908"><div class="name">cream-300</div><div class="hex">#D4C7AB</div></div>
  </div>
</div>
</body></html>
