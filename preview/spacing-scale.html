<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .row{display:flex;align-items:flex-end;gap:12px;}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--orange-500);}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg-2);}
  .px{font-family:var(--font-mono);font-size:11px;font-weight:600;}
</style></head>
<body>
<div class="card">
  <div class="label">Spacing scale — 4px base</div>
  <div class="row">
    <div class="step"><div class="bar" style="width:4px;height:4px"></div><div class="px">4</div><div class="name">1</div></div>
    <div class="step"><div class="bar" style="width:8px;height:8px"></div><div class="px">8</div><div class="name">2</div></div>
    <div class="step"><div class="bar" style="width:12px;height:12px"></div><div class="px">12</div><div class="name">3</div></div>
    <div class="step"><div class="bar" style="width:16px;height:16px"></div><div class="px">16</div><div class="name">4</div></div>
    <div class="step"><div class="bar" style="width:24px;height:24px"></div><div class="px">24</div><div class="name">5</div></div>
    <div class="step"><div class="bar" style="width:32px;height:32px"></div><div class="px">32</div><div class="name">6</div></div>
    <div class="step"><div class="bar" style="width:48px;height:48px"></div><div class="px">48</div><div class="name">7</div></div>
    <div class="step"><div class="bar" style="width:64px;height:64px"></div><div class="px">64</div><div class="name">8</div></div>
  </div>
</div>
</body></html>
