<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);font-family:var(--font-body);}
  .card{padding:24px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:18px;}
  .row{display:flex;gap:28px;}
  .step{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:88px;height:64px;background:var(--cream-50);border:2px solid var(--ink-1000);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:600;}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-2);text-align:center;}
</style></head>
<body>
<div class="card">
  <div class="label">Shadow system — hard offset is the signature</div>
  <div class="row">
    <div class="step"><div class="box" style="box-shadow:3px 3px 0 0 #0A0908">POP</div><div class="name">pop / ink</div></div>
    <div class="step"><div class="box" style="box-shadow:3px 3px 0 0 #FF5A1F">POP</div><div class="name">pop / orange</div></div>
    <div class="step"><div class="box" style="box-shadow:0 1px 2px rgba(10,9,8,.08),0 4px 12px rgba(10,9,8,.06);border-color:#E6DCC7">SOFT</div><div class="name">soft</div></div>
    <div class="step"><div class="box" style="box-shadow:0 8px 24px rgba(10,9,8,.12);border-color:#E6DCC7">LIFT</div><div class="name">lift</div></div>
  </div>
</div>
</body></html>
