<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);}
  .card{padding:20px;display:flex;align-items:center;gap:24px;}
  .frame{width:160px;height:160px;background:var(--cream-100);border:2px solid var(--ink-1000);overflow:hidden;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .frame img{width:100%;height:auto;display:block;}
  .meta{flex:1;}
  .ey{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);}
  .name{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-0.02em;margin:6px 0 4px;}
  .desc{font-family:var(--font-body);font-size:13px;color:var(--fg-2);line-height:1.45;}
  .role{margin-top:10px;display:inline-block;font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;background:var(--orange-500);color:var(--ink-1000);padding:3px 8px;}
</style></head>
<body>
<div class="card">
  <div class="frame"><img src="../assets/mascot-jony.png" alt="JONY" /></div>
  <div class="meta">
    <div class="ey">// Mascot · 0X1KEY-04A</div>
    <div class="name">JONY</div>
    <div class="desc">The face of o1key. Spiky, tactical, watchful — uses the brand orange on the harness; teal earring is the rare-gem accent.</div>
    <div class="role">PRIMARY CHARACTER</div>
  </div>
</div>
</body></html>
