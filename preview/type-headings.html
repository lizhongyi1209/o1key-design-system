<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);color:var(--fg-1);}
  .card{padding:20px;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px;}
  .row{display:grid;grid-template-columns:80px 1fr;gap:8px 16px;align-items:baseline;}
  .tag{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-2);}
  .h1{font-family:var(--font-display);font-weight:700;font-size:42px;line-height:1.05;letter-spacing:-0.02em;}
  .h2{font-family:var(--font-display);font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-0.02em;}
  .h3{font-family:var(--font-display);font-weight:600;font-size:20px;line-height:1.15;}
  .h4{font-family:var(--font-display);font-weight:600;font-size:16px;line-height:1.15;}
</style></head>
<body>
<div class="card">
  <div class="label">Heading scale</div>
  <div class="row">
    <div class="tag">H1 / 56</div><div class="h1">Engineered for speed.</div>
    <div class="tag">H2 / 40</div><div class="h2">Section header here</div>
    <div class="tag">H3 / 24</div><div class="h3">Subsection title</div>
    <div class="tag">H4 / 20</div><div class="h4">Card heading</div>
  </div>
</div>
</body></html>
